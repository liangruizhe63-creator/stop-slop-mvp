<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stop Slop MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">hardikpandya/stop-slop inspired MVP</p>
        <h1>AI文本检测工具</h1>
        <p class="lede">
         粘贴文本，一键分析AI生成概率、重复率和写作特征。
        </p>
        <div class="hero-chips">
          <span>中英文都能演示</span>
          <span>规则命中可视化</span>
          <span>一键复制结果</span>
        </div>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-title">
            <h2>待检测文本</h2>
            <div class="sample-buttons">
              <button type="button" data-sample="zh">中文样例</button>
              <button type="button" data-sample="en">English sample</button>
            </div>
          </div>

          <div class="toolbar">
            <label class="mode-picker" for="modeSelect">
              <span>检测模式</span>
              <select id="modeSelect">
                <option value="light">轻度</option>
                <option value="balanced" selected>标准</option>
                <option value="strong">强力</option>
              </select>
            </label>
            <div id="stats" class="stats"></div>
          </div>

          <textarea id="draft" spellcheck="false"></textarea>

          <div class="actions">
            <button id="rewriteBtn" class="primary" type="button">开始检测</button>
            <button id="clearBtn" type="button">清空</button>
          </div>
        </div>

        <div class="panel output-panel">
          <div class="panel-title">
            <h2>检测结果</h2>
            <div class="output-meta">
              <span id="scoreBadge" class="score-badge">等待输入</span>
              <button id="copyBtn" type="button">复制结果</button>
            </div>
          </div>
          <div id="output" class="output empty">结果会显示在这里。</div>
          <p id="copyHint" class="copy-hint">复制后可以直接贴到邮件、帖子或文档里。</p>
        </div>
      </section>

      <section class="insights">
        <article class="panel compare-panel">
          <div class="panel-title">
            <h2>文本分析</h2>
            <span id="modeBadge" class="mode-badge">标准模式</span>
          </div>
          <div class="compare-grid">
            <div>
              <h3>原稿标注</h3>
              <div id="annotated" class="output empty">这里会高亮原稿里的套路表达。</div>
            </div>
            <div>
              <h3>改写说明</h3>
              <ul id="rewriteNotes" class="findings">
                <li>改写后会说明这次主要做了哪些动作。</li>
              </ul>
            </div>
          </div>
        </article>

        <article class="panel">
          <h2>风险提示</h2>
          <ul id="findings" class="findings">
            <li>输入文字后会列出具体问题。</li>
          </ul>
        </article>

        <article class="panel">
          <h2>AI特征评分</h2>
          <div id="scoreGrid" class="score-grid"></div>
        </article>

        <article class="panel">
          <h2>规则说明</h2>
          <div id="ruleLegend" class="legend-grid"></div>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
